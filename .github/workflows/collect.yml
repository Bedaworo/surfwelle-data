name: Collect water data

on:
  schedule:
    # Alle 15 Minuten. GitHub Actions löst auf 5-Minuten-Granularität auf,
    # die echte Ausführung kann sich aber bei Lastspitzen um 5-10 Minuten verzögern.
    - cron: '*/15 * * * *'
  workflow_dispatch:  # manueller Trigger über die UI

permissions:
  contents: write  # damit der Workflow committen darf

# Verhindert, dass sich Läufe überschneiden, wenn einer mal länger braucht
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        run: python collect.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "data: $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Mehrere parallele Läufe sind unwahrscheinlich, aber sicher ist sicher
            for i in 1 2 3; do
              git pull --rebase origin "${GITHUB_REF_NAME}" && git push && break
              echo "Push attempt $i failed, retrying..."
              sleep 5
            done
          else
            echo "Keine neuen Daten zu committen."
          fi
